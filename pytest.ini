[pytest]
# Pytest configuration for Agente-IA

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests (slow, need services)
    unit: marks tests as unit tests (fast, isolated)
    smoke: marks tests as smoke tests (quick sanity checks)
    slow: marks tests as slow
    critical: marks tests as critical path

# Coverage options
addopts =
    --strict-markers
    --tb=short
    -ra

# Asyncio mode (required for pytest-asyncio)
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

# Timeout
timeout = 300
timeout_method = thread

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
