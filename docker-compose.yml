services:
  redis:
    image: redis:7.2-alpine
    container_name: agente-ia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agente-ia-network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agente-ia-fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    command: python main.py
    networks:
      - agente-ia-network
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: agente-ia-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      - fastapi
    volumes:
      - .:/app
      - /app/__pycache__
    command: streamlit run dashboard/super_admin.py
    networks:
      - agente-ia-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  agente-ia-network:
    driver: bridge
